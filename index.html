<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <center>
            <h1>
                Expense Tracker
            </h1>
        </center>
    </header>
    <form>
        <label for="description">Describe your expense : </label>
        <input type="text" name="description" placeholder="Enter your reason here..." required>

        <label for="amount">Enter the amount you spent : </label>
        <input type="number" name="amount" placeholder="Enter the amount here..." required>
        <p id="numberChecker"></p>

        <label for="">Select the category:</label>
        <select name="category" id="category-select" required>
            <option value="">Please select a category</option>
            <option value="Food">Food</option>
            <option value="Electricity">Electricity</option>
            <option value="Rent">Rent</option>
            <option value="Travel">Travel</option>
            <option value="Shopping">Shopping</option>
            <option value="Party">Party</option>
            <option value="Other">Other</option>
        </select>

        <label for="date"> Enter the date : </label>
        <input type="date" name="date" id="date" required>

        <button type="submit" id="submit">
            Add this expense
        </button>
    </form>

    <div id="total-display">
        <h4>Total Expense:</h4>
        <p id="totalTillNow"></p>
    </div>
    </div>

    <div id="container">
        <div id="search">

            <input type="text" id="description-search" placeholder="Search by description...">

            <select id="category-search">
                <option value="">All Categories</option>
                <option value="Food">Food</option>
                <option value="Electricity">Electricity</option>
                <option value="Rent">Rent</option>
                <option value="Travel">Travel</option>
                <option value="Shopping">Shopping</option>
                <option value="Party">Party</option>
                <option value="Other">Other</option>
            </select>

            <button id="search-button">
                Search
            </button>

            <button id="clear-button">
                Clear
            </button>

        </div>

        <div id="expensesKeeper"></div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
